<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>Russeknuter 2026</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin: 40px auto; background:#f5f5f5; }
    h1 { text-align:center; }
    .knot { background:white; padding:10px; margin:8px 0; border-radius:8px; display:flex; gap:10px; }
    button { padding:10px; margin:10px 0; width:100%; }
  </style>
</head>
<body>

<h1>Russeknuter 2026</h1>
<button id="loginBtn">Logg inn med Google</button>
<button id="logoutBtn" style="display:none;">Logg ut</button>
<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA4WSsw6qwDZS_QZeGiPJoegZ-OfNrTWRk",
  authDomain: "russeknuter-2026.firebaseapp.com",
  projectId: "russeknuter-2026",
  storageBucket: "russeknuter-2026.firebasestorage.app",
  messagingSenderId: "574659342881",
  appId: "1:574659342881:web:5b19b43709cfafd594a960",
  measurementId: "G-MJCDBF1CFC"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

const list = document.getElementById("list");
const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");

let currentUser = null;

loginBtn.onclick = () => signInWithPopup(auth, provider);
logoutBtn.onclick = () => signOut(auth);

onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user;
    loginBtn.style.display = "none";
    logoutBtn.style.display = "block";
    loadKnots();
  } else {
    list.innerHTML = "";
    loginBtn.style.display = "block";
    logoutBtn.style.display = "none";
  }
});

async function loadKnots() {
  list.innerHTML = "";

  // hent felles knuter
  const knotsSnap = await getDocs(collection(db, "knots"));

  knotsSnap.forEach(async (knotDoc) => {
    const knotData = knotDoc.data();
    const knotId = knotDoc.id;

    // hent brukerens status
    const userDocRef = doc(db, "users", currentUser.uid, "knots", knotId);
    const userSnap = await getDoc(userDocRef);

    const done = userSnap.exists() ? userSnap.data().done : false;

    const div = document.createElement("div");
    div.className = "knot";

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.checked = done;

    checkbox.addEventListener("change", async () => {
      await setDoc(userDocRef, { done: checkbox.checked });
    });

    const label = document.createElement("span");
    label.textContent = knotData.text;

    div.appendChild(checkbox);
    div.appendChild(label);
    list.appendChild(div);
  });
}
</script>

</body>
</html>
